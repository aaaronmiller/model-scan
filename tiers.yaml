# ============================================================================
#  MODEL TIER REGISTRY — Static tier assignments for model-scan v4+
#  Location: ~/.config/model-scan/tiers.yaml
#
#  CHANGES FROM PREVIOUS VERSION
#  ──────────────────────────────────────────────────────────────────────────
#  - PROMOTED: MiniMax M2.5 from B-tier → A-tier (SWE-Bench 80.2%,
#    BFCL 76.8%, near-Opus-level coding at 1/10th cost)
#  - PROMOTED: Owl Alpha from B-tier → B+ tier (1M ctx, agentic,
#    #1 most-used on OR, BUT 13.5% structured output error rate)
#  - CONFIRMED: GLM 4.5 Flash is B-tier (not A). AA ~35, decent but
#    not competitive with V4-Flash or M2.5 for primary work.
#  - REMOVED: zai-glm-4.7 from B-tier (NOT free, $2.25/$2.75/M paid,
#    only "free" within 1M tok/day Cerebras budget)
#  - ADDED: Qwen3 Coder 480B A35B as tentative S-tier if on OR free
#  - ADDED: Hunter Alpha as tentative A-tier (stealth model, vision)
#  - FIXED: OpenRouter free quota is 1,000/day/MODEL with $10 credits
#
#  TIER DEFINITIONS (as of 2026-05-28)
#  ──────────────────────────────────────────────────────────────────────────
#  S-tier: Frontier reasoning. Use for primary reasoning when budget allows.
#  A-tier: Deployable for primary work. Strong tool-calling or coding.
#  B+-tier: Strong for free but with real tradeoffs (owl-alpha territory).
#  B-tier: Capable secondaries. Acceptable for auxiliary slots.
#  C-tier: Functional but degrading. Only for speed-critical trivial tasks.
#  D-tier: Below threshold. Never use for reasoning/summarization.
#
#  MAINTENANCE: Update weekly. When AA-Intelligence drops 5+ points below
#  tier's expected range, demote one tier. When it rises 5+ above, promote.
# ============================================================================

